name: CI Pipeline

# Dispara em pushes e PRs para main e dev
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x] # Usa a versão LTS mais recente

    steps:
    # 1. Baixa o código do repositório
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Configura o Node.js
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm' # Cacheia as dependências para ser mais rápido

    # 3. Instala as dependências
    - name: Install dependencies
      run: npm ci

    # 4. Verifica formatação
    # - name: Check Linting
    #   run: npm run lint

    # 5. Roda os Testes Unitários
    - name: Run Unit Tests
      run: npm run test
      env:
        CI: true

    # 6. Tenta fazer o Build
    - name: Build Application
      run: npm run build